<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XML Validator - Browser JavaScript</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }

  .demo-banner { background: #0f172a; color: #f8fafc; text-align: center; padding: 0.6rem 1rem; font-size: 0.85rem; }
  .demo-banner a { color: #60a5fa; text-decoration: none; font-weight: 600; }
  .demo-banner a:hover { text-decoration: underline; }

  .container { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.4rem; }
  .subtitle { color: #64748b; margin-bottom: 1.5rem; font-size: 0.95rem; }

  .editor-pane label { display: block; font-size: 0.8rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
  textarea {
    width: 100%; height: 360px; padding: 0.75rem; font-family: 'Fira Mono', 'Cascadia Code', monospace;
    font-size: 0.8rem; line-height: 1.5; border: 1px solid #cbd5e1; border-radius: 8px;
    background: #fff; color: #1e293b; resize: vertical; outline: none;
    transition: border-color 0.15s; margin-bottom: 1rem;
  }
  textarea:focus { border-color: #3b82f6; }
  textarea.error { border-color: #ef4444; background: #fef2f2; }

  .btn { display: inline-block; padding: 0.55rem 1.2rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #e2e8f0; color: #334155; }
  .btn-secondary:hover { background: #cbd5e1; }

  .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }

  .code-status { font-size: 0.85rem; padding: 0.4rem 0.75rem; border-radius: 6px; }
  .code-status.error { background: #fef2f2; color: #b91c1c; }

  .xmlval-result {
    display: none; padding: 1rem 1.25rem; border-radius: 10px;
    font-size: 0.9rem; display: flex; align-items: center; gap: 0.6rem;
    margin-top: 0.5rem;
  }
  .xmlval-valid { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
  .xmlval-error { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
  .xmlval-result svg { flex-shrink: 0; }
</style>
</head>
<body>

<div class="demo-banner">
  Live demo with full features: <a href="https://file-converter-free.com/en/developer-tools/xml-validator-online" target="_blank" rel="noopener">file-converter-free.com - XML Validator Online</a>
</div>

<div class="container">
  <h1>XML Validator</h1>
  <p class="subtitle">Validate XML well-formedness instantly in your browser using the native DOMParser API. No server required.</p>

  <div class="editor-pane">
    <label for="inputArea">Paste XML to Validate</label>
    <textarea id="inputArea" placeholder="Paste your XML here..."></textarea>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="convertBtn" type="button">Validate XML</button>
    <button class="btn btn-secondary" id="clearBtn" type="button">Clear</button>
  </div>

  <div id="status" class="code-status"></div>
  <div id="xmlvalResult" class="xmlval-result" style="display:none;"></div>
</div>

<script>
(function() {
    var inputEl = document.getElementById('inputArea');
    var statusEl = document.getElementById('status');
    var resultEl = document.getElementById('xmlvalResult');
    var convertBtn = document.getElementById('convertBtn');
    var clearBtn = document.getElementById('clearBtn');

    function setStatus(msg, type) {
        if (!statusEl) return;
        statusEl.textContent = msg;
        statusEl.className = 'code-status ' + (type || '');
    }

    function validate() {
        if (!inputEl) return;
        var text = inputEl.value.trim();
        if (!text) {
            setStatus('', '');
            if (resultEl) { resultEl.style.display = 'none'; resultEl.innerHTML = ''; }
            return;
        }
        try {
            var parser = new DOMParser();
            var doc = parser.parseFromString(text, 'application/xml');
            var parseError = doc.querySelector('parsererror');
            if (parseError) {
                var msg = parseError.textContent.trim().split('\n')[0];
                inputEl.classList.add('error');
                setStatus('', '');
                if (resultEl) {
                    resultEl.style.display = 'block';
                    resultEl.className = 'xmlval-result xmlval-error';
                    resultEl.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> <strong>Invalid XML</strong> &mdash; ' + escapeHtml(msg);
                }
            } else {
                inputEl.classList.remove('error');
                var elCount = doc.getElementsByTagName('*').length;
                setStatus('', '');
                if (resultEl) {
                    resultEl.style.display = 'block';
                    resultEl.className = 'xmlval-result xmlval-valid';
                    resultEl.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> <strong>Valid XML</strong> &mdash; ' + elCount + ' element' + (elCount !== 1 ? 's' : '') + ' found, root: &lt;' + escapeHtml(doc.documentElement.nodeName) + '&gt;';
                }
            }
        } catch (e) {
            inputEl.classList.add('error');
            setStatus('Error: ' + e.message, 'error');
        }
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    if (convertBtn) convertBtn.addEventListener('click', validate);

    if (clearBtn) {
        clearBtn.addEventListener('click', function() {
            inputEl.value = '';
            inputEl.classList.remove('error');
            setStatus('', '');
            if (resultEl) { resultEl.style.display = 'none'; resultEl.innerHTML = ''; }
        });
    }
})();
</script>
</body>
</html>
